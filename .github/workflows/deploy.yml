name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 136492549638.dkr.ecr.ap-southeast-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/simplewebaccess-prod-backend:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/simplewebaccess-prod-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/simplewebaccess-prod-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/simplewebaccess-prod-frontend:latest

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in prod.yml
        run: |
          TAG=${{ needs.build-and-push.outputs.image_tag }}
          sed -i "s|simplewebaccess-prod-backend:.*|simplewebaccess-prod-backend:${TAG}|g" gitops/prod.yml
          sed -i "s|simplewebaccess-prod-frontend:.*|simplewebaccess-prod-frontend:${TAG}|g" gitops/prod.yml

      - name: Commit and push updated prod.yml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/prod.yml
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "ci: update image tags to ${{ needs.build-and-push.outputs.image_tag }}" && git push)
