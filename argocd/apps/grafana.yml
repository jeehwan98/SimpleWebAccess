apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jeehwan98/SimpleWebAccess.git
    targetRevision: main
    path: charts/grafana
    helm:
      valueFiles:
        - ../../gitops/prod.yml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
