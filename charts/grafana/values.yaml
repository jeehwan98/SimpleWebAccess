replicaCount: 1

image:
  repository: grafana/grafana
  tag: "10.4.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

admin:
  user: admin
  password: admin

datasource:
  url: http://prometheus-svc:9090

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
