apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-backend
data:
  backend.json: |
    {
      "title": "Backend",
      "uid": "backend",
      "schemaVersion": 36,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(http_server_requests_seconds_count{app=\"backend\"}[1m]))",
            "legendFormat": "requests/s"
          }]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx/s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(http_server_requests_seconds_count{app=\"backend\",status=~\"5..\"}[1m]))",
            "legendFormat": "errors/s"
          }]
        },
        {
          "id": 3,
          "title": "Response Time P95 (s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{app=\"backend\"}[5m])) by (le))",
            "legendFormat": "p95"
          }]
        },
        {
          "id": 4,
          "title": "JVM Heap Memory",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{app=\"backend\",area=\"heap\"}",
              "legendFormat": "used"
            },
            {
              "expr": "jvm_memory_committed_bytes{app=\"backend\",area=\"heap\"}",
              "legendFormat": "committed"
            }
          ]
        }
      ]
    }
